<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 8asret Lkleb</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            padding-top: 80px;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: white;
            border-bottom: var(--border-width) solid var(--text-black);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: capitalize;
            color: var(--text-black);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--text-black);
        }

        .sidebar {
            position: fixed;
            left: 2rem;
            top: 120px;
            width: 90px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 900;
        }

        .sidebar-item {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: var(--border-width) solid var(--text-black);
            box-shadow: 4px 4px 0px 0px var(--text-black);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .sidebar-item i {
            color: var(--text-black);
            font-size: 1.5rem;
        }

        .sidebar-item:hover {
            background: var(--primary-yellow);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--text-black);
        }

        main {
            margin-left: 140px;
            padding: 2rem;
        }

        .section-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 3rem;
            display: inline-block;
            background: var(--primary-yellow);
            padding: 0.5rem 1rem;
            border: var(--border-width) solid var(--text-black);
            box-shadow: 4px 4px 0px 0px var(--text-black);
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: var(--border-width) solid var(--text-black);
            box-shadow: 4px 4px 0px 0px var(--text-black);
            font-weight: 700;
            outline: none;
        }
    </style>
</head>

<body>
    <nav>
        <a href="../index.html" class="logo">8asret l kleb</a>
        <div class="nav-links">
            <a href="../index.html">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="../sidbar/cours.html">COURSES</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <a href="#" class="brutal-btn">JOIN NOW</a>
    </nav>
    <div class="sidebar">
        <a href="../sidbar/tools.html" class="sidebar-item" title="Tools"><i class="fas fa-toolbox"></i></a>
        <a href="../sidbar/library.html" class="sidebar-item" title="Library"><i class="fas fa-book"></i></a>
        <a href="../sidbar/doawalde.html" class="sidebar-item" title="Download"><i class="fas fa-download"></i></a>
        <a href="../sidbar/youtube.html" class="sidebar-item" title="Youtube"><i class="fab fa-youtube"></i></a>
        <a href="../sidbar/cours.html" class="sidebar-item" title="Courses"><i class="fas fa-graduation-cap"></i></a>
    </div>
    <main class="container">
        <h2 class="section-title">Get in Touch</h2>
        <div class="brutal-card contact-form">
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Email Address">
            <textarea placeholder="How can we help you?" rows="5"></textarea>
            <button class="brutal-btn">Send Message</button>
        </div>
    </main>
</body>

</html>
